name: React Native CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  RUBY_VERSION: "3.2"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint, Types & Unit Tests
  # ─────────────────────────────────────────────
  ci-checks:
    name: CI Checks (Lint + Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: TypeScript type check
        run: yarn tsc --noEmit

      - name: Run unit tests with coverage
        run: yarn test --coverage --ci --watchAll=false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Security audit
        run: yarn audit --level high
        continue-on-error: true # Don't fail build, but report

  # ─────────────────────────────────────────────
  # JOB 2: Build Validation (JS bundle only)
  # ─────────────────────────────────────────────
  build-check:
    name: JS Bundle Build Check
    runs-on: ubuntu-latest
    needs: ci-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Build iOS bundle
        run: |
          yarn react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output /tmp/main.jsbundle

      - name: Build Android bundle
        run: |
          yarn react-native bundle \
            --entry-file index.js \
            --platform android \
            --dev false \
            --bundle-output /tmp/index.android.bundle

      - name: Check bundle sizes
        run: |
          IOS_SIZE=$(wc -c < /tmp/main.jsbundle)
          ANDROID_SIZE=$(wc -c < /tmp/index.android.bundle)
          echo "iOS bundle: $((IOS_SIZE / 1024)) KB"
          echo "Android bundle: $((ANDROID_SIZE / 1024)) KB"
          # Fail if bundle > 5MB (tune this threshold)
          if [ $IOS_SIZE -gt 5242880 ]; then
            echo "ERROR: iOS bundle too large!" && exit 1
          fi

